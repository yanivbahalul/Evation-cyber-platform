worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Docker embedded DNS server. Using `resolver` + variable-based `proxy_pass`
  # forces nginx to re-resolve service names when containers change IPs.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 2s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream admin_panel {
    server admin-panel:3000;
  }

  upstream gateway {
    server gateway:4001;
  }

  upstream telemetry {
    server telemetry:3002;
  }

  server {
    listen 80;
    server_name _;
    # We run behind Docker port mappings (host 8080 -> container 80).
    # Use relative redirects so the browser stays on the correct host:port.
    absolute_redirect off;

    # TLS termination is handled by AWS ALB in production; enable ssl_* here for local HTTPS if needed.

    location /socket.io/ {
      set $telemetry_upstream http://telemetry:3002;
      proxy_pass $telemetry_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blue Team attack monitor is served by Next.js (admin-panel), not the gateway.
    location ^~ /gateway/dashboard/ {
      set $admin_panel_upstream http://admin-panel:3000;
      proxy_pass $admin_panel_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /gateway/dashboard {
      return 301 /gateway/dashboard/;
    }

    location /gateway/ {
      # When `proxy_pass` uses a variable, nginx will not do the usual URI
      # replacement semantics. Use a host-only upstream to preserve the URI
      # so `/gateway/safezone.css` reaches the gateway as `/gateway/safezone.css`.
      set $gateway_host gateway:4001;
      proxy_pass http://$gateway_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gateway {
      return 301 /gateway/;
    }

    # Gateway-first entrypoint: gateway is mounted under /gateway (BASE_PATH).
    location = / {
      return 302 /gateway/;
    }

    # Admin-panel (Next.js) endpoints used by gateway handoff and auth flows.
    location ^~ /api/ {
      set $admin_panel_upstream http://admin-panel:3000;
      proxy_pass $admin_panel_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If we ever serve any Next.js pages/assets through nginx.
    location ^~ /_next/ {
      set $admin_panel_upstream http://admin-panel:3000;
      proxy_pass $admin_panel_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      # Gateway-first: landing page and login start here.
      # Map non-/gateway paths into the gateway's BASE_PATH.
      rewrite ^/(.*)$ /gateway/$1 break;
      set $gateway_host gateway:4001;
      proxy_pass http://$gateway_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
