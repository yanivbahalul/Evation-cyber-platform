worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Docker embedded DNS server. Using `resolver` + variable-based `proxy_pass`
  # forces nginx to re-resolve service names when containers change IPs.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 2s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream adminpanel {
    server admin-panel:3000;
  }

  server {
    listen 80;
    server_name _;
    # We run behind Docker port mappings (host 8080 -> container 80).
    # Use relative redirects so the browser stays on the correct host:port.
    absolute_redirect off;

    # TLS termination is handled by AWS ALB in production; enable ssl_* here for local HTTPS if needed.

    location /socket.io/ {
      # Variable proxy_pass re-resolves telemetry after container rebuilds (avoids 502).
      set $telemetry_upstream telemetry:3002;
      proxy_pass http://$telemetry_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Blue Team attack monitor is served by Next.js (admin-panel), not the gateway.
    location ^~ /gateway/dashboard/ {
      proxy_pass http://adminpanel;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /gateway/dashboard {
      return 301 /gateway/dashboard/;
    }

    location /gateway/ {
      set $gateway_upstream gateway:4001;
      proxy_pass http://$gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gateway {
      return 301 /gateway/;
    }

    # Gateway-first entrypoint: gateway is mounted under /gateway (BASE_PATH).
    location = / {
      return 302 /gateway/;
    }

    # Admin-panel (Next.js) endpoints used by gateway handoff and auth flows.
    location ^~ /api/ {
      proxy_pass http://adminpanel;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The admin-panel currently redirects /admin/ban/ into the gateway dashboard.
    # Short-circuit here to avoid nginx proxy edge-cases seen in some setups.
    location = /admin/ban {
      return 307 /gateway/dashboard/?tab=bans;
    }

    location = /admin/ban/ {
      return 307 /gateway/dashboard/?tab=bans;
    }

    # Admin-panel pages live under /admin/*.
    location ^~ /admin/ {
      proxy_pass http://adminpanel;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
      return 301 /admin/;
    }

    # Legacy Next.js shortcuts (admin-panel redirects).
    location = /ops {
      return 301 /ops/;
    }

    location ^~ /ops/ {
      proxy_pass http://adminpanel;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If we ever serve any Next.js pages/assets through nginx.
    location ^~ /_next/ {
      proxy_pass http://adminpanel;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      # Gateway-first: landing page and login start here.
      # Map non-/gateway paths into the gateway's BASE_PATH.
      rewrite ^/(.*)$ /gateway/$1 break;
      set $gateway_upstream gateway:4001;
      proxy_pass http://$gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
