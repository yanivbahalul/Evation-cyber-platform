services:
  nginx:
    image: nginx:1.27-alpine
    # Single public entrypoint (gateway-first).
    ports:
      - "0.0.0.0:3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      admin-panel:
        condition: service_started
      gateway:
        condition: service_started
      telemetry:
        condition: service_started
    restart: unless-stopped

  # Public URL via Cloudflare Quick Tunnel (prints a trycloudflare.com link in logs).
  cloudflared:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.cloudflared
    # Prints the trycloudflare URL once. If it can't get one, prints a single error line.
    command: ["http://nginx:80"]
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped

  admin-panel:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.admin-panel
    env_file:
      - ../.env
    environment:
      GATEWAY_ORIGIN: http://gateway:4001
      PUBLIC_HOST: ${PUBLIC_HOST?Set PUBLIC_HOST to your LAN IP (e.g. 192.168.0.89)}
      DEV_PUBLIC_HOST: ${PUBLIC_HOST?Set PUBLIC_HOST to your LAN IP (e.g. 192.168.0.89)}
      UI_PORT: "3000"
    expose:
      - "3000"
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.gateway
    env_file:
      - ../.env
    environment:
      PORT: 4001
      BASE_PATH: /gateway
      MONGODB_URI: ${SAFEZONE_DB_URI}
      PUBLIC_HOST: ${PUBLIC_HOST?Set PUBLIC_HOST to your LAN IP (e.g. 192.168.0.89)}
      PUBLIC_PORT: "3000"
    expose:
      - "4001"
    restart: unless-stopped

  telemetry:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.telemetry
    env_file:
      - ../.env 
    expose:
      - "3002"
    restart: unless-stopped
